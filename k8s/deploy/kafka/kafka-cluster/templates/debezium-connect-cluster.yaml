apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: debezium-connect-cluster
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  replicas: 1
  version: {{ .Values.kafka.version | quote }}
  bootstrapServers: kafka-cluster-kafka-bootstrap:9092
  {{- if not .Values.debeziumConnect.buildImage }}
  image: {{ .Values.debeziumConnect.image | quote }}
  {{- end }}
  jvmOptions:
    -Xms: {{ .Values.debeziumConnect.jvmXms | quote }}
    -Xmx: {{ .Values.debeziumConnect.jvmXmx | quote }}
  config:
    config.providers: secrets
    config.providers.secrets.class: io.strimzi.kafka.KubernetesSecretConfigProvider
    group.id: connect-cluster
    offset.storage.topic: kafka_connect_offsets
    config.storage.topic: kafka_connect_configs
    status.storage.topic: kafka_connect_status
    # -1 means it will use the default replication factor configured in the broker
    config.storage.replication.factor: -1
    offset.storage.replication.factor: -1
    status.storage.replication.factor: -1
  {{- if not .Values.debeziumConnect.buildImage }}
  template:
    pod:
      volumes:
        - name: connect-log4j-properties
          configMap:
            name: {{ include "kafka.fullname" . }}-connect-log4j1
    connectContainer:
      volumeMounts:
        - name: connect-log4j-properties
          mountPath: /opt/kafka/custom-config/log4j.properties
          subPath: log4j.properties
  {{- end }}
  {{- if .Values.debeziumConnect.buildImage }}
  build:
    output:
      type: docker
      image: {{ .Values.debeziumConnect.image | quote }}
      pushSecret: {{ .Values.debeziumConnect.pushSecret | quote }}
    plugins:
      - name: debezium-postgresql-connector
        artifacts:
          - type: tgz
            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/{{ .Values.debeziumConnect.debeziumPluginVersion }}/debezium-connector-postgres-{{ .Values.debeziumConnect.debeziumPluginVersion }}-plugin.tar.gz
  {{- end }}