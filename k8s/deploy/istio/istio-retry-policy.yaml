###############################################################################
# istio-retry-policy.yaml — VirtualService retry & timeout configuration
#
# Configures automatic retry when a service returns 5xx errors,
# connection failures, or resets. This improves resilience for
# transient failures without application code changes.
#
# Active services: product, cart, order, customer, inventory, tax, media,
#                  search, storefront-bff, backoffice-bff
#
# Disabled services (not deployed): payment, rating, location, promotion
#
# Policy details:
#   - attempts: 3         (retry up to 3 times)
#   - perTryTimeout: 5s   (each attempt times out after 5 seconds)
#   - retryOn: 5xx, reset, connect-failure
#   - timeout: 20s        (overall request timeout)
#
# Apply:
#   kubectl apply -f istio-retry-policy.yaml
#
# Verify:
#   kubectl get virtualservice -n yas
#   # Generate traffic and check Kiali for retry metrics
###############################################################################

# === product service ===
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: product-vs
  namespace: yas
spec:
  hosts:
    - product
  http:
    - route:
        - destination:
            host: product
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure,retriable-4xx
      timeout: 20s

