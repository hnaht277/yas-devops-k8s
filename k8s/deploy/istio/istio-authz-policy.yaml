        - source:
            principals:
              - "cluster.local/ns/yas/sa/cart"
              - "cluster.local/ns/yas/sa/payment"
              - "cluster.local/ns/yas/sa/storefront-bff"
              - "cluster.local/ns/yas/sa/backoffice-bff"
              - "cluster.local/ns/yas/sa/sampledata"

