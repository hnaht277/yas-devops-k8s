###############################################################################
# istio-authz-policy.yaml — Authorization policies for YAS microservices
#
# Strategy: deny-all default, then whitelist allowed callers per service.
#
# Active services: product, cart, order, customer, inventory, tax, media,
#                  search, storefront-bff, storefront-ui, backoffice-bff,
#                  backoffice-ui, swagger-ui
#
# Disabled services (not deployed): payment, rating, location, promotion,
#                                    sampledata
#
# Apply:  kubectl apply -f istio-authz-policy.yaml
# Verify: kubectl get authorizationpolicy -n yas
###############################################################################

# DENY-ALL default
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all-default
  namespace: yas
spec: {}

---
# product: cart, order, inventory, storefront-bff, backoffice-bff
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-product-access
  namespace: yas
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/yas/sa/cart"
              - "cluster.local/ns/yas/sa/order"
              - "cluster.local/ns/yas/sa/inventory"
              - "cluster.local/ns/yas/sa/storefront-bff"
              - "cluster.local/ns/yas/sa/backoffice-bff"

---
# media: cart, storefront-bff, backoffice-bff
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-media-access
  namespace: yas
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: media
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/yas/sa/cart"
              - "cluster.local/ns/yas/sa/storefront-bff"
              - "cluster.local/ns/yas/sa/backoffice-bff"

---
# cart: order, storefront-bff
apiVersion: security.istio.io/v1
